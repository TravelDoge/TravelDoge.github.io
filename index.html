<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>London Tube Explorer - 伦敦地铁探索</title>
<style>
:root {
  --bakerloo: #B36305; --central: #E32017; --circle: #FFD300;
  --district: #00782A; --hammersmith: #F3A9BB; --jubilee: #A0A5A9;
  --metropolitan: #9B0056; --northern: #000000; --piccadilly: #003688;
  --victoria: #0098D4; --waterloo: #95CDBA; --dlr: #00A4A7;
  --elizabeth: #6950A1; --overground: #EE7C0E; --tram: #78BE20;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;overflow:hidden;background:#1a1a2e}

#sidebar{width:380px;min-width:380px;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;z-index:20;box-shadow:2px 0 20px rgba(0,0,0,0.5)}
#sidebar.collapsed{width:0;min-width:0;overflow:hidden}
.sidebar-header{padding:20px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-header h1{font-size:1.3em;font-weight:700}
.sidebar-header .sub{font-size:0.75em;color:rgba(255,255,255,0.4);margin-top:2px}
.mode-tabs{display:flex;margin:12px 20px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden}
.mode-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:0.82em;font-weight:500;border:none;background:none;color:rgba(255,255,255,0.5);transition:.2s;border-radius:8px}
.mode-tab.active{background:var(--piccadilly);color:#fff}
.search-box{margin:0 20px 8px;position:relative}
.search-box input{width:100%;padding:10px 12px 10px 34px;border-radius:8px;border:none;font-size:0.82em;background:rgba(255,255,255,0.1);color:#fff;outline:none}
.search-box input::placeholder{color:rgba(255,255,255,0.35)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.4;font-size:0.85em}
.search-results{max-height:220px;overflow-y:auto;margin:0 20px}
.search-result{padding:8px 12px;cursor:pointer;border-radius:6px;font-size:0.8em;transition:.15s;display:flex;align-items:center;gap:8px}
.search-result:hover{background:rgba(255,255,255,0.1)}
.line-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

.sidebar-body{flex:1;overflow-y:auto;padding:0 20px 16px}
.sec-title{font-size:0.68em;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.35);margin:14px 0 6px}
.station-card{background:rgba(255,255,255,0.05);border-radius:10px;padding:14px;margin-bottom:8px;border-left:3px solid transparent;transition:.2s}
.station-card.selected{background:rgba(0,54,136,0.35);border-left-color:var(--piccadilly)}
.station-card .sname{font-size:1em;font-weight:600;margin-bottom:4px}
.line-tags{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0}
.line-tag{font-size:0.68em;padding:2px 8px;border-radius:10px;font-weight:500;color:#fff}
.zone-badge{font-size:0.7em;color:rgba(255,255,255,0.35);margin-top:2px}

.attr-item{background:rgba(255,255,255,0.03);border-radius:8px;padding:10px 12px;margin:6px 0}
.attr-item .aname{font-size:0.88em;font-weight:500}
.attr-item .atype{font-size:0.68em;color:rgba(255,255,255,0.35);margin-top:1px}
.attr-item .adesc{font-size:0.72em;color:rgba(255,255,255,0.55);margin-top:3px;line-height:1.4}
.attr-item .awalk{font-size:0.68em;color:var(--victoria);margin-top:3px}

.nearby-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:.15s}
.nearby-row:hover{background:rgba(255,255,255,0.1)}
.dist-badge{min-width:36px;height:28px;border-radius:14px;background:rgba(0,152,212,0.3);display:flex;align-items:center;justify-content:center;font-size:0.7em;font-weight:600}

.route-step{padding:6px 12px;border-left:2px solid rgba(255,255,255,0.15);margin-left:8px;font-size:0.78em;color:rgba(255,255,255,0.6)}
.route-step.start{border-left-color:var(--victoria);color:#fff;font-weight:500}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:8px;font-size:0.85em;cursor:pointer;font-weight:500;color:#fff;transition:.15s}
.btn-primary{background:var(--victoria)}.btn-danger{background:var(--central)}
.btn:hover{opacity:0.85;transform:translateY(-1px)}
.btn-sm{padding:6px 12px;font-size:0.75em}

#main-area{flex:1;position:relative;overflow:hidden;background:#f0ebe0}
#main-area svg{display:block;width:100%;height:100%;cursor:grab}
#main-area svg:active{cursor:grabbing}

.map-controls{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:5px;z-index:10}
.mbtn{width:34px;height:34px;border-radius:8px;border:none;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.15);cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;transition:.15s}
.mbtn:hover{background:#f0f0f0}
.legend-bar{position:absolute;top:10px;left:10px;display:flex;flex-wrap:wrap;gap:3px 10px;background:rgba(255,255,255,0.93);padding:6px 10px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);font-size:0.65em;z-index:10}
.legend-item{display:flex;align-items:center;gap:4px;white-space:nowrap}
.legend-color{width:12px;height:2.5px;border-radius:2px}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 22px;border-radius:8px;font-size:0.82em;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.tooltip{position:absolute;background:#1a1a2e;color:#fff;padding:6px 10px;border-radius:6px;font-size:0.75em;pointer-events:none;z-index:15;white-space:nowrap;display:none}
.tooltip.show{display:block}

.toggle-btn{position:absolute;top:10px;left:380px;width:24px;height:32px;background:#1a1a2e;border:none;color:#fff;border-radius:0 6px 6px 0;cursor:pointer;z-index:21;font-size:0.7em;transition:left .3s}
#sidebar.collapsed+.toggle-btn,#sidebar.collapsed~.toggle-btn{left:0}
#sidebar.collapsed~#main-area .toggle-btn{left:0}

.empty-state{text-align:center;padding:36px 16px;color:rgba(255,255,255,0.25)}
.empty-state .icon{font-size:1.8em;margin-bottom:6px}
.empty-state p{font-size:0.8em}
.checkin-bar{font-size:0.75em;padding:8px 20px;background:rgba(255,255,255,0.04);display:none}
.checkin-bar.show{display:block}

@media(max-width:768px){
  #sidebar{position:absolute;inset:0;width:100%;min-width:0;z-index:25}
  #sidebar.collapsed{transform:translateX(-100%);width:100%;min-width:0}
  .toggle-btn{left:auto;right:-24px;border-radius:6px 0 0 6px}
}
</style>
</head>
<body>

    <h1>London Tube Explorer</h1>

let mode = 'checkin', selectedStation = null, targetStation = null, routePath = null;
// ViewBox covers TfL SVG coordinate space: x: -1317 to 1317, y: -817 to 917
let vb = {x:-1317, y:-817, w:2634, h:1734};
let isPanning = false, panStart = null;

// ============ MAP RENDERING ============
const mainArea = document.getElementById('main-area');
let svg = null;

function getLinesForStation(name) {
  const lines = [];
  for (const [ln, sts] of Object.entries(L)) {
    if (sts.includes(name)) lines.push(ln);
  }
  return lines;
}

function createMap() {
  const NS = 'http://www.w3.org/2000/svg';
  svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  // Background (full TfL map area)
  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('x', '-1317'); bg.setAttribute('y', '-817');
  bg.setAttribute('width', '2634'); bg.setAttribute('height', '1734');
  bg.setAttribute('fill', '#f7f2e6');
  svg.appendChild(bg);

  // Thames (approximated from SVG)
  const thames = document.createElementNS(NS, 'path');
  thames.setAttribute('d', 'M -1200,180 C -900,160 -500,140 -100,120 C 100,110 300,100 500,90 C 700,85 900,90 1100,100');
  thames.setAttribute('stroke', '#bed4e6'); thames.setAttribute('stroke-width', '24');
  thames.setAttribute('fill', 'none'); thames.setAttribute('opacity', '0.6');
  svg.appendChild(thames);

  // Groups
  const lg = document.createElementNS(NS, 'g'); lg.id = 'linesG';
  const sg = document.createElementNS(NS, 'g'); sg.id = 'stationsG';
  const rg = document.createElementNS(NS, 'g'); rg.id = 'routeG';
  const mg = document.createElementNS(NS, 'g'); mg.id = 'labelsG';

  // Draw lines
  const drawn = new Set();
  for (const [ln, sts] of Object.entries(L)) {
    const color = LC[ln] || '#999';
    for (let i = 0; i < sts.length - 1; i++) {
      const a = sts[i], b = sts[i+1];
      if (!S[a] || !S[b] || a === b) continue;
      const key = [a,b].sort().join('|') + '|' + ln;
      if (drawn.has(key)) continue;
      drawn.add(key);
      const line = document.createElementNS(NS, 'line');
      line.setAttribute('x1', S[a][0]); line.setAttribute('y1', S[a][1]);
      line.setAttribute('x2', S[b][0]); line.setAttribute('y2', S[b][1]);
      line.setAttribute('stroke', color); line.setAttribute('stroke-width', '4');
      line.setAttribute('stroke-linecap', 'round'); line.setAttribute('opacity', '0.7');
      lg.appendChild(line);
    }
  }

  // Draw stations
  const drawnSt = new Set();
  for (const [name, [x,y]] of Object.entries(S)) {
    if (drawnSt.has(name)) continue;
    drawnSt.add(name);
    const lines = getLinesForStation(name);
    const isHub = lines.length >= 2;

    const g = document.createElementNS(NS, 'g');
    g.setAttribute('transform', `translate(${x},${y})`);
    g.classList.add('stn'); g.dataset.name = name;

    if (isHub) {
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('r', '6.25'); c.setAttribute('fill', '#fff');
      c.setAttribute('stroke', '#333'); c.setAttribute('stroke-width', '2.5');
      g.appendChild(c);
      lines.forEach((ln, i) => {
        const dot = document.createElementNS(NS, 'circle');
        const a = (i/lines.length)*Math.PI*2 - Math.PI/2;
        dot.setAttribute('cx', Math.cos(a)*9); dot.setAttribute('cy', Math.sin(a)*9);
        dot.setAttribute('r', '3'); dot.setAttribute('fill', LC[ln]||'#999');
        g.appendChild(dot);
      });
    } else {
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('r', '5'); c.setAttribute('fill', '#fff');
      c.setAttribute('stroke', LC[lines[0]]||'#999'); c.setAttribute('stroke-width', '3');
      g.appendChild(c);
    }

    const hit = document.createElementNS(NS, 'circle');
    hit.setAttribute('r', '18'); hit.setAttribute('fill', 'transparent');
    g.appendChild(hit);
    sg.appendChild(g);

    // Label
    if (lines.length > 0) {
      const txt = document.createElementNS(NS, 'text');
      txt.setAttribute('x', x + 10); txt.setAttribute('y', y + 4);
      txt.setAttribute('font-size', '10'); txt.setAttribute('fill', '#333');
      txt.setAttribute('font-weight', isHub?'600':'400');
      txt.setAttribute('font-family', 'sans-serif');
      txt.textContent = name; mg.appendChild(txt);
    }
  }

  svg.appendChild(lg); svg.appendChild(sg); svg.appendChild(rg); svg.appendChild(mg);
  return svg;
}

function updateViewBox() {
  if (!svg) return;
  svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
}

function initMap() {
  mainArea.innerHTML = '';
  svg = createMap();
  mainArea.appendChild(svg);

  // Station interactions
  svg.querySelectorAll('.stn').forEach(g => {
    g.addEventListener('click', e => { e.stopPropagation(); handleStationClick(g.dataset.name); });
    g.addEventListener('mouseenter', e => { showTooltip(e, g.dataset.name); });
    g.addEventListener('mouseleave', hideTooltip);
  });

  // Pan
  svg.addEventListener('mousedown', e => {
    if (e.target.closest('.stn')) return;
    isPanning = true; panStart = {x: e.clientX, y: e.clientY, vx: vb.x, vy: vb.y};
    svg.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!isPanning || !panStart) return;
    const scale = vb.w / mainArea.clientWidth;
    vb.x = panStart.vx - (e.clientX - panStart.x) * scale;
    vb.y = panStart.vy - (e.clientY - panStart.y) * scale;
    updateViewBox();
  });
  window.addEventListener('mouseup', () => { isPanning = false; if(svg)svg.style.cursor='grab'; });

  // Wheel zoom
  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const scale = vb.w / mainArea.clientWidth;
    const mx = vb.x + (e.clientX - mainArea.getBoundingClientRect().left) * scale;
    const my = vb.y + (e.clientY - mainArea.getBoundingClientRect().top) * scale;
    const factor = e.deltaY > 0 ? 1.15 : 0.87;
    const nw = vb.w * factor, nh = vb.h * factor;
    if (nw < 400 || nw > 8000) return;
    vb.x = mx - (mx - vb.x) * factor;
    vb.y = my - (my - vb.y) * factor;
    vb.w = nw; vb.h = nh;
    updateViewBox();
  });

  // Touch
  let lastDist = 0;
  svg.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      lastDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    }
  }, {passive:true});
  svg.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      const factor = dist / lastDist;
      const nw = vb.w / factor, nh = vb.h / factor;
      if (nw >= 400 && nw <= 8000) { vb.w = nw; vb.h = nh; updateViewBox(); }
      lastDist = dist;
    }
  }, {passive:false});
}

// ============ INTERACTIONS ============
function handleStationClick(name) {
  selectedStation = name;
  if (mode === 'explore' && targetStation && targetStation !== name) {
    calculateRoute(selectedStation, targetStation);
  }
  if (mode === 'checkin') {
    targetStation = null; routePath = null;
    clearRoute();
  }
  showStationDetail(name);
  highlightStation(name);
  centerOnStation(name);
  if (mode === 'checkin') checkIn(name);
}

function centerOnStation(name) {
  const [sx, sy] = S[name] || [700, 500];
  vb.x = sx - vb.w/2;
  vb.y = sy - vb.h/2;
  updateViewBox();
}

function highlightStation(name) {
  svg.querySelectorAll('.stn circle:not([fill="transparent"])').forEach(c => {
    const orig = c.dataset.sw || c.getAttribute('stroke-width');
    c.dataset.sw = orig;
    c.setAttribute('stroke-width', c.parentElement.dataset.name === name ? '6' : orig);
  });
}

function showStationDetail(name) {
  if (!S[name]) return;
  const lines = getLinesForStation(name);
  const zone = Z[name] !== undefined ? (Z[name]===0?'特殊区':'Zone '+Z[name]) : '?';
  const attrs = A[name] || [];
  let h = `<div class="station-card selected"><div class="sname">${name}</div>`;
  h += `<div class="line-tags">${lines.map(l=>`<span class="line-tag" style="background:${LC[l]||'#999'}">${LZ[l]||l}</span>`).join('')}</div>`;
  h += `<div class="zone-badge">${zone}${lines.length>=2?' · 换乘站':''}</div></div>`;

  if (attrs.length) {
    h += `<div class="sec-title">附近景点 (${attrs.length})</div>`;
    attrs.forEach(a => {
      h += `<div class="attr-item"><div class="aname">${a.n} <small>${a.e}</small></div><div class="atype">${a.t}</div><div class="adesc">${a.d}</div><div class="awalk">步行约 ${a.w} 分钟</div></div>`;
    });
  } else {
    h += `<div class="sec-title">暂无景点数据</div><div style="font-size:0.72em;color:rgba(255,255,255,0.3);padding:8px 0">该站点景点信息持续添加中</div>`;
  }

  if (mode === 'explore') {
    h += `<div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary btn-sm" onclick="setTarget('${name}')" style="flex:1;justify-content:center">设为目标</button>
      <button class="btn btn-danger btn-sm" onclick="setOrigin('${name}')" style="flex:1;justify-content:center">设为起点</button>
    </div>`;
  }

  showInSidebar('stationDetail', h);
}

function showInSidebar(id, html) {
  ['stationDetail','explorePanel'].forEach(x => document.getElementById(x).style.display='none');
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById(id).style.display = 'block';
  document.getElementById(id).innerHTML = html;

// ============ EXPLORE MODE ============
function setOrigin(name) {
  selectedStation = S[name] ? name : selectedStation;
  if (targetStation && selectedStation !== targetStation) calculateRoute(selectedStation, targetStation);
  toast(`起点: ${name}`);
}
function setTarget(name) {
  targetStation = S[name] ? name : targetStation;
  if (selectedStation && selectedStation !== targetStation) calculateRoute(selectedStation, targetStation);
  toast(`目标: ${name}`);
}

function calculateRoute(from, to) {
  const queue = [[from]]; const visited = new Set([from]);
  while (queue.length) {
    const path = queue.shift(); const cur = path[path.length-1];
    if (cur === to) { routePath = path; drawRoute(path); showRouteSteps(path); return; }
    const neighbors = CONN[cur] || [];
    for (const n of neighbors) {
      if (!visited.has(n)) { visited.add(n); queue.push([...path, n]); }
    }
  }
  toast('未找到路线');
}

function clearRoute() {
  const rg = document.getElementById('routeG');
  if (rg) rg.innerHTML = '';
  document.getElementById('explorePanel').style.display = 'none';
}

function drawRoute(path) {
  const rg = document.getElementById('routeG');
  if (!rg) return;
  rg.innerHTML = '';
  const NS = 'http://www.w3.org/2000/svg';
  let d = '';
  path.forEach((n,i) => {
    const [x,y] = S[n]||[];
    if (!x) return;
    d += (i===0?'M':'L') + ` ${x} ${y}`;
  });
  const p = document.createElementNS(NS, 'path');
  p.setAttribute('d', d); p.setAttribute('stroke', '#0098D4');
  p.setAttribute('stroke-width', '8'); p.setAttribute('fill', 'none');
  p.setAttribute('stroke-linecap', 'round'); p.setAttribute('opacity', '0.85');
  rg.appendChild(p);
  // Animated dash
  const dash = document.createElementNS(NS, 'path');
  dash.setAttribute('d', d); dash.setAttribute('stroke', '#fff');
  dash.setAttribute('stroke-width', '5'); dash.setAttribute('fill', 'none');
  dash.setAttribute('stroke-dasharray', '10 20'); dash.setAttribute('stroke-linecap', 'round');
  const anim = document.createElementNS(NS, 'animate');
  anim.setAttribute('attributeName', 'stroke-dashoffset');
  anim.setAttribute('from', '30'); anim.setAttribute('to', '0');
  anim.setAttribute('dur', '0.8s'); anim.setAttribute('repeatCount', 'indefinite');
  dash.appendChild(anim); rg.appendChild(dash);
}

function showRouteSteps(path) {
  let h = `<div class="sec-title">导航路线 (${path.length}站)</div>`;
  let curLine = null;
  for (let i = 0; i < path.length; i++) {
    let line = null;
    if (i < path.length-1) {
      const conns = CONN[path[i]] || [];
      // Find which line connects to next station
      for (const [ln, sts] of Object.entries(L)) {
        const ai = sts.indexOf(path[i]), bi = sts.indexOf(path[i+1]);
        if (ai>=0 && bi>=0 && Math.abs(ai-bi)===1) { line = ln; break; }
      }
    }
    if (line && line !== curLine) {
      h += `<div class="sec-title" style="margin-top:10px;color:${LC[line]||'#999'};font-size:0.62em">乘坐 ${LZ[line]||line} (${line})</div>`;
      curLine = line;
    }
    const hub = getLinesForStation(path[i]).length >= 2;
    h += `<div class="route-step ${i===0?'start':''}">${i===0?'🔰':i===path.length-1?'🎯':'⬇'} ${path[i]}${hub?' <span style="font-size:0.7em;opacity:0.5">[换乘]</span>':''}</div>`;
  }
  showInSidebar('explorePanel', h);
}

// ============ CONNECTIONS ============
const CONN = {};
(function buildConns() {
  for (const [ln, sts] of Object.entries(L)) {
    for (let i = 0; i < sts.length - 1; i++) {
      const a = sts[i], b = sts[i+1];
      if (!S[a] || !S[b] || a === b) continue;
      if (!CONN[a]) CONN[a] = []; if (!CONN[b]) CONN[b] = [];
      if (!CONN[a].includes(b)) CONN[a].push(b);
      if (!CONN[b].includes(a)) CONN[b].push(a);
    }
  }
})();

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function initExplore() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      userLoc = {lat:pos.coords.latitude, lng:pos.coords.longitude};
      let minDist = Infinity;
      for (const [n, c] of Object.entries(GEO)) {
        const d = haversine(userLoc.lat, userLoc.lng, c[0], c[1]);
        if (d < minDist) { minDist = d; nearestStn = n; }
      }
      if (nearestStn) toast(`最近站: ${nearestStn} (约${(minDist*1000).toFixed(0)}m)`);
      showNearby();
    }, () => { showNearby(); });
  }
}

function showNearby() {
  const panel = document.getElementById('explorePanel');
  if (!nearestStn) {
    panel.innerHTML = `<div class="sec-title">探索附近</div><button class="btn btn-primary btn-sm" onclick="initExplore()" style="width:100%;justify-content:center">获取我的位置</button><div style="margin-top:8px;font-size:0.72em;color:rgba(255,255,255,0.3);text-align:center">需位置权限</div>`;
    panel.style.display = 'block';
    document.getElementById('emptyState').style.display = 'none';
    return;
  }
  const nearby = [];
  for (const [n, c] of Object.entries(GEO)) {
    if (!S[n] || !userLoc) continue;
    const d = haversine(userLoc.lat, userLoc.lng, c[0], c[1]);
    if (d < 5) nearby.push({n, d});
  }
  nearby.sort((a,b)=>a.d-b.d);
  let h = `<div class="sec-title">附近站点</div><div style="font-size:0.68em;color:rgba(255,255,255,0.3);margin-bottom:8px">5km范围内</div>`;
  nearby.slice(0,8).forEach(s => {
    const attrs = A[s.n] || [];
    h += `<div class="nearby-row" onclick="handleStationClick('${s.n}')"><div class="dist-badge">${(s.d*1000).toFixed(0)}m</div><div style="flex:1"><div style="font-size:0.85em">${s.n}</div><div style="font-size:0.65em;color:rgba(255,255,255,0.35)">${attrs.length}个景点</div></div><span style="font-size:0.75em">→</span></div>`;
  });
  h += `<div class="sec-title" style="margin-top:12px">快速操作</div><button class="btn btn-primary btn-sm" onclick="handleStationClick('${nearestStn}');setOrigin('${nearestStn}')" style="width:100%;justify-content:center">从最近站出发: ${nearestStn}</button>`;
  showInSidebar('explorePanel', h);
}

// ============ LEGEND ============
function buildLegend() {
  document.getElementById('legendBar').innerHTML = Object.entries(LZ).slice(0,12).map(([en,zh]) =>
    `<div class="legend-item"><span class="legend-color" style="background:${LC[en]}"></span>${zh}</div>`
  ).join('');
}

// ============ INIT ============
initMap();
buildLegend();
updateCheckinBar();
window.addEventListener('resize', updateViewBox);
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') { selectedStation=targetStation=null;routePath=null;clearRoute();hideAll(); }
});
